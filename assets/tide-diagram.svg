<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'Georgia', 'Times New Roman', serif">

  <rect width="780" height="380" fill="#fff"/>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" fill="#222" font-size="14" font-weight="700">How TIDE Works</text>
  <text x="390" y="44" text-anchor="middle" fill="#888" font-size="10">Every token decides how many layers it actually needs</text>
  <line x1="120" y1="54" x2="660" y2="54" stroke="#ddd" stroke-width="0.5"/>

  <!-- ======= (a) WITHOUT TIDE ======= -->
  <text x="165" y="76" text-anchor="middle" fill="#555" font-size="11" font-style="italic">(a)  Without TIDE</text>
  <text x="165" y="90" text-anchor="middle" fill="#aaa" font-size="8.5">All tokens run every layer</text>

  <!-- Input tokens -->
  <text x="100" y="116" text-anchor="middle" fill="#666" font-size="9">"The"</text>
  <text x="165" y="116" text-anchor="middle" fill="#666" font-size="9">"cat"</text>
  <text x="230" y="116" text-anchor="middle" fill="#666" font-size="9">"sat"</text>

  <!-- Connecting dots -->
  <circle cx="100" cy="122" r="1.2" fill="#aaa"/>
  <circle cx="165" cy="122" r="1.2" fill="#aaa"/>
  <circle cx="230" cy="122" r="1.2" fill="#aaa"/>

  <!-- Layer stack -->
  <rect x="68" y="128" width="195" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="165" y="143" text-anchor="middle" fill="#888" font-size="8">Layer 1</text>

  <rect x="68" y="156" width="195" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="165" y="171" text-anchor="middle" fill="#888" font-size="8">Layer 8</text>

  <rect x="68" y="184" width="195" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="165" y="199" text-anchor="middle" fill="#888" font-size="8">Layer 16</text>

  <text x="165" y="220" text-anchor="middle" fill="#ccc" font-size="9">&#x22EE;</text>

  <rect x="68" y="228" width="195" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="165" y="243" text-anchor="middle" fill="#888" font-size="8">Layer 32</text>

  <!-- Vertical paths (all tokens, all layers) -->
  <g stroke="#ccc" stroke-width="0.5" stroke-dasharray="2 1.5">
    <line x1="100" y1="124" x2="100" y2="250"/>
    <line x1="165" y1="124" x2="165" y2="250"/>
    <line x1="230" y1="124" x2="230" y2="250"/>
  </g>

  <!-- Output arrows -->
  <g stroke="#aaa" stroke-width="0.7">
    <line x1="100" y1="250" x2="100" y2="268"/>
    <line x1="165" y1="250" x2="165" y2="268"/>
    <line x1="230" y1="250" x2="230" y2="268"/>
  </g>
  <polygon points="97.5,268 100,273 102.5,268" fill="#aaa"/>
  <polygon points="162.5,268 165,273 167.5,268" fill="#aaa"/>
  <polygon points="227.5,268 230,273 232.5,268" fill="#aaa"/>

  <text x="100" y="286" text-anchor="middle" fill="#888" font-size="8">output</text>
  <text x="165" y="286" text-anchor="middle" fill="#888" font-size="8">output</text>
  <text x="230" y="286" text-anchor="middle" fill="#888" font-size="8">output</text>

  <!-- Brace + cost label -->
  <text x="165" y="312" text-anchor="middle" fill="#b91c1c" font-size="9">32 layers &#x00D7; 3 tokens = 96 operations</text>

  <!-- ======= DIVIDER ======= -->
  <line x1="340" y1="68" x2="340" y2="330" stroke="#e5e5e5" stroke-width="0.5"/>

  <!-- ======= (b) WITH TIDE ======= -->
  <text x="555" y="76" text-anchor="middle" fill="#555" font-size="11" font-style="italic">(b)  With TIDE</text>
  <text x="555" y="90" text-anchor="middle" fill="#aaa" font-size="8.5">Each token exits when its representation converges</text>

  <!-- Input tokens -->
  <text x="440" y="116" text-anchor="middle" fill="#15803d" font-size="9" font-weight="600">"The"</text>
  <text x="530" y="116" text-anchor="middle" fill="#1d4ed8" font-size="9" font-weight="600">"cat"</text>
  <text x="620" y="116" text-anchor="middle" fill="#666" font-size="9">"sat"</text>

  <circle cx="440" cy="122" r="1.2" fill="#15803d"/>
  <circle cx="530" cy="122" r="1.2" fill="#1d4ed8"/>
  <circle cx="620" cy="122" r="1.2" fill="#999"/>

  <!-- Shared layers 1-7 -->
  <rect x="408" y="128" width="245" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="530" y="143" text-anchor="middle" fill="#888" font-size="8">Layers 1 &#x2013; 7</text>
  <g stroke-dasharray="2 1.5" stroke-width="0.5">
    <line x1="440" y1="124" x2="440" y2="150" stroke="#15803d"/>
    <line x1="530" y1="124" x2="530" y2="150" stroke="#1d4ed8"/>
    <line x1="620" y1="124" x2="620" y2="150" stroke="#ccc"/>
  </g>

  <!-- ROUTER @ 8 -->
  <rect x="408" y="154" width="245" height="18" rx="9" fill="#fefce8" stroke="#ca8a04" stroke-width="0.7"/>
  <text x="530" y="166" text-anchor="middle" fill="#854d0e" font-size="7.5" font-weight="600">Router checks: has this token converged?</text>

  <!-- "The" EXITS -->
  <line x1="440" y1="172" x2="440" y2="180" stroke="#15803d" stroke-width="1"/>
  <line x1="440" y1="180" x2="700" y2="180" stroke="#15803d" stroke-width="0.6" stroke-dasharray="3 2"/>
  <line x1="700" y1="180" x2="700" y2="268" stroke="#15803d" stroke-width="0.7"/>
  <polygon points="697.5,268 700,273 702.5,268" fill="#15803d"/>
  <text x="700" y="286" text-anchor="middle" fill="#15803d" font-size="8">output</text>

  <!-- "The" exit label -->
  <rect x="445" y="174" width="50" height="13" rx="3" fill="#dcfce7" stroke="#15803d" stroke-width="0.5"/>
  <text x="470" y="184" text-anchor="middle" fill="#15803d" font-size="7" font-weight="600">exits L8</text>

  <!-- "The" annotation -->
  <text x="714" y="184" text-anchor="start" fill="#15803d" font-size="7" font-style="italic">easy token</text>
  <text x="714" y="194" text-anchor="start" fill="#15803d" font-size="7" font-style="italic">skips 24 layers</text>

  <!-- x2, x3 continue -->
  <g stroke-dasharray="2 1.5" stroke-width="0.5">
    <line x1="530" y1="172" x2="530" y2="184" stroke="#1d4ed8"/>
    <line x1="620" y1="172" x2="620" y2="184" stroke="#ccc"/>
  </g>

  <!-- Layers 9-15 -->
  <rect x="498" y="188" width="155" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="575" y="203" text-anchor="middle" fill="#888" font-size="8">Layers 9 &#x2013; 15</text>
  <g stroke-dasharray="2 1.5" stroke-width="0.5">
    <line x1="530" y1="184" x2="530" y2="210" stroke="#1d4ed8"/>
    <line x1="620" y1="184" x2="620" y2="210" stroke="#ccc"/>
  </g>

  <!-- ROUTER @ 16 -->
  <rect x="498" y="214" width="155" height="18" rx="9" fill="#fefce8" stroke="#ca8a04" stroke-width="0.7"/>
  <text x="575" y="226" text-anchor="middle" fill="#854d0e" font-size="7.5" font-weight="600">Router checks again</text>

  <!-- "cat" EXITS -->
  <line x1="530" y1="232" x2="530" y2="240" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="530" y1="240" x2="700" y2="240" stroke="#1d4ed8" stroke-width="0.6" stroke-dasharray="3 2"/>
  <text x="700" y="252" text-anchor="middle" fill="#1d4ed8" font-size="8">output</text>

  <rect x="535" y="234" width="54" height="13" rx="3" fill="#dbeafe" stroke="#1d4ed8" stroke-width="0.5"/>
  <text x="562" y="244" text-anchor="middle" fill="#1d4ed8" font-size="7" font-weight="600">exits L16</text>

  <!-- x3 continues alone -->
  <line x1="620" y1="232" x2="620" y2="244" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2 1.5"/>

  <!-- Layers 17-32 -->
  <rect x="588" y="248" width="64" height="22" rx="2" fill="#f4f4f4" stroke="#ccc" stroke-width="0.5"/>
  <text x="620" y="263" text-anchor="middle" fill="#888" font-size="8">L17&#x2013;32</text>
  <line x1="620" y1="244" x2="620" y2="270" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2 1.5"/>

  <!-- x3 output -->
  <line x1="620" y1="270" x2="620" y2="273" stroke="#666" stroke-width="0.7"/>
  <polygon points="617.5,273 620,278 622.5,273" fill="#666"/>
  <text x="620" y="292" text-anchor="middle" fill="#666" font-size="8">output</text>
  <text x="620" y="304" text-anchor="middle" fill="#aaa" font-size="7" font-style="italic">hard token</text>
  <text x="620" y="314" text-anchor="middle" fill="#aaa" font-size="7" font-style="italic">needs all layers</text>

  <!-- TIDE cost -->
  <text x="570" y="340" text-anchor="middle" fill="#15803d" font-size="9" font-weight="600">8 + 16 + 32 = 56 operations  (42% fewer)</text>

  <!-- Bottom caption -->
  <line x1="40" y1="358" x2="740" y2="358" stroke="#e5e5e5" stroke-width="0.5"/>
  <text x="390" y="374" text-anchor="middle" fill="#aaa" font-size="8" font-style="italic">Routers are tiny MLPs (~0.5M params) trained once. No model weights are changed.</text>

</svg>
